    <!--
      SW self-heal. Rescues clients stuck behind a stale Service Worker that keeps
      serving an outdated precached index.html referencing broken chunks. Listens
      (capture phase, before the app module dies) for the module-link SyntaxError,
      then unregisters every SW, wipes all caches and reloads once. A sessionStorage
      guard prevents reload loops if the fresh build is also somehow broken.
    -->
    <script>
      (function () {
        if (!("serviceWorker" in navigator)) return;
        var GUARD = "__sw_heal_done";

        function isStaleChunkError(msg) {
          return (
            !!msg &&
            (msg.indexOf("__tla") !== -1 ||
              msg.indexOf("does not provide an export") !== -1 ||
              msg.indexOf("Failed to fetch dynamically imported module") !== -1 ||
              msg.indexOf("error loading dynamically imported module") !== -1)
          );
        }

        function heal() {
          if (sessionStorage.getItem(GUARD)) return; // already healed this session
          sessionStorage.setItem(GUARD, "1");
          navigator.serviceWorker
            .getRegistrations()
            .then(function (regs) {
              return Promise.all(
                regs.map(function (r) {
                  return r.unregister();
                }),
              );
            })
            .then(function () {
              return window.caches && caches.keys ? caches.keys() : [];
            })
            .then(function (keys) {
              return Promise.all(
                keys.map(function (k) {
                  return caches.delete(k);
                }),
              );
            })
            .catch(function () {})
            .then(function () {
              window.location.reload();
            });
        }

        window.addEventListener(
          "error",
          function (e) {
            if (isStaleChunkError(e && e.message)) heal();
          },
          true,
        );
        window.addEventListener("unhandledrejection", function (e) {
          var r = e && e.reason;
          if (isStaleChunkError(r && (r.message || String(r)))) heal();
        });

        // Normal-update path: pick up a fresh SW when it takes control.
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          window.location.reload();
        });
        navigator.serviceWorker.getRegistration().then(function (reg) {
          if (reg) reg.update();
        });

        // Clear the guard once the app has loaded cleanly so future breakage can heal.
        window.addEventListener("load", function () {
          setTimeout(function () {
            sessionStorage.removeItem(GUARD);
          }, 10000);
        });
      })();
    </script>
