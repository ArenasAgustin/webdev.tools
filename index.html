    <style>
      html,

      #root {

      body {
        margin: 0;

        font-family:
          Inter,
          system-ui,

          Segoe UI,
          Roboto,

          Arial,
          sans-serif;
      }
    </style>

    <script>
      if ("serviceWorker" in navigator) {
        // Force SW update check on every load. When a new SW activates
        // (controllerchange), reload so new chunks are served — this breaks
        // the crash loop caused by stale cached chunks with wrong exports.
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          window.location.reload();
        });
        navigator.serviceWorker.getRegistration().then(function (reg) {
          if (reg) reg.update();
        });
      }
    </script>
    <script type="importmap">
      {
        "imports": {
          "@php-wasm/web": "https://esm.sh/@php-wasm/web@3.1.36",
          "@php-wasm/universal": "https://esm.sh/@php-wasm/universal@3.1.36",
          "@php-wasm/util": "https://esm.sh/@php-wasm/util@3.1.36"
        }
      }
    </script>
  </head>

  </body>
