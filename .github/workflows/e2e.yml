name: E2E

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main, develop]

env:
  BUDGET_KB: 3584

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Bundle size stats
        continue-on-error: true
        run: |
          echo "## Bundle Stats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size (KB) |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/assets/*.js dist/assets/*.css; do
            if [ -f "$f" ]; then
              size=$(du -k "$f" | cut -f1)
              name=$(basename "$f")
              echo "| \`$name\` | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          total=$(du -sk dist/ | cut -f1)
          echo "**Total dist size: ${total} KB**" >> $GITHUB_STEP_SUMMARY

      - name: Enforce bundle budget
        run: |
          SIZE_KB=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${SIZE_KB} KB (budget: ${{ env.BUDGET_KB }} KB)"
          if [ "$SIZE_KB" -gt "${{ env.BUDGET_KB }}" ]; then
            echo "❌ Bundle exceeds budget of ${{ env.BUDGET_KB }} KB"
            exit 1
          fi
          echo "✅ Bundle within budget"

      - name: Upload bundle stats
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
          retention-days: 14

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm e2e:install

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
